version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - APP_ENV=development
    env_file:
      - .env
    depends_on:
      - redis
      - legacy-db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  legacy-db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legacy_erp
    volumes:
      - ./docker/seed.sql:/docker-entrypoint-initdb.d/seed.sql
